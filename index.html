<style>
body, h1,h2,h3,h4,h5,h6 {
  font-family: "Computer Modern Bright", sans-serif;

body {
  background-color: #f4f4f4;
}

/* Sidebar */
.w3-sidebar {
  width: 200px;
  background: #ffffff;
  border-right: none;
  box-shadow: 3px 0 8px rgba(0,0,0,0.15);
  z-index: 4;
}

/* Bande décorative verticale */
#decorative-band {
  position: fixed;
  top: 0;
  left: 200px;
  width: 60px;
  height: 100%;
  z-index: 2;
  overflow: hidden;
  box-shadow: 3px 0 8px rgba(0,0,0,0.15);
}

#decorative-band img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}

#main {
  margin-left: 260px;
  background-color: #f4f4f4;
  min-height: 100vh;
}

@media only screen and (max-width: 992px) {
  #main { margin-left: 0 }
  #decorative-band { display: none; }
  #mySidebar { padding-top: 70px; }
}

/* Sidebar links */
.w3-sidebar a.w3-bar-item {
  color: #333;
  font-size: 14px;
  padding: 12px 16px;
  display: block;
  text-decoration: none;
  border-left: 3px solid transparent;
  transition: all 0.2s;
}

.w3-sidebar a.w3-bar-item:hover {
  background-color: #f0f0f0;
  color: #000;
  border-left: 3px solid #555;
}

/* Sidebar title */
.sidebar-title {
  padding: 32px 16px 24px;
  text-align: center;
  border-bottom: 1px solid #eee;
  color: #111;
}

/* Dropdown menu */
.dropdown-btn {
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  background: none;
  border: none;
  font-family: "Montserrat", sans-serif;
  font-size: 14px;
  font-weight: bold;
  color: #333;
  padding: 12px 16px;
  border-left: 3px solid transparent;
  transition: all 0.2s;
  text-align: left;
  box-sizing: border-box;
}

.dropdown-btn:hover {
  background-color: #f0f0f0;
  color: #000;
  border-left: 3px solid #555;
}

.dropdown-btn .fa {
  font-size: 11px;
  transition: transform 0.2s;
}

.dropdown-btn.open .fa {
  transform: rotate(180deg);
}

.dropdown-container {
  display: none;
  background-color: #fafafa;
  border-left: none;
}

.dropdown-container a {
  padding: 10px 16px 10px 28px !important;
  font-size: 13px !important;
  font-weight: normal !important;
  color: #555 !important;
  border-left: 3px solid transparent !important;
}

.dropdown-container a:hover {
  color: #111 !important;
  background-color: #efefef !important;
  border-left: 3px solid #999 !important;
}

/* Regular nav links bold */
.w3-sidebar .nav-link {
  font-weight: bold;
}

/* Header */
header {
  background-color: #ffffff;
  border-bottom: 1px solid #ddd;
}

/* Content */
.content-section {
  background-color: #ffffff;
  margin: 24px;
  padding: 32px;
  border-radius: 2px;
  border: 1px solid #e0e0e0;
}

hr.section-rule {
  border: none;
  border-top: 1px solid #ddd;
  width: 200px;
  margin: 16px auto 24px 0;
}

h2 {
  color: #111;
}

p {
  color: #444;
  line-height: 1.7;
}

/* Small screen navbar */
#myNavbar {
  background: #ffffff !important;
  border-bottom: 1px solid #ddd;
}

#myNavbar a {
  color: #333 !important;
}

#myNavbar a:hover {
  background-color: #f0f0f0 !important;
}

@media (max-width: 600px) {
  #about {
    margin-top: 6em;

<!-- Sidebar chargée dynamiquement -->
<div id="sidebar-container"></div>

<!-- Contenu principal -->
<div class="w3-padding-large" id="main">

  <div class="content-section" id="about" style="display:flex; align-items:flex-start; gap:1.5rem; flex-wrap:wrap;">

    <img src="deco/photomoi.jpeg" alt="Youri Samut"
         style="width:90px; height:90px; object-fit:cover; border-radius:50%; flex-shrink:0; border:0.5px solid #ddd;">

    <div style="flex:1; min-width:180px;">
      <p style="margin:0 0 2px; font-size:1.2em; font-weight:500;">Youri Samut</p>

      <p style="margin:0 0 14px; line-height:1.6;">
        Ce site est consacré aux cours de mathématiques que je dispense en classe préparatoire et en école d'ingénieurs.
        J'y propose des ressources pédagogiques accessibles à la fois aux étudiants et aux collègues intéressés.
      </p>
      <div style="display:flex; gap:14px; align-items:center;">
        <a href="mailto:samut.youri@hotmail.fr" title="M'envoyer un e-mail" style="color:#888; text-decoration:none;">
          <i class="fa fa-envelope" style="font-size:1.1em;"></i>
        </a>
        <a href="https://www.linkedin.com/in/youri-samut-8949b3149/" title="LinkedIn" target="_blank" style="color:#888; text-decoration:none;">
          <i class="fa fa-linkedin-square" style="font-size:1.1em;"></i>
        </a>
        <a href="https://github.com/yourisamut" title="GitHub" target="_blank" style="color:#888; text-decoration:none;">
          <i class="fa fa-github" style="font-size:1.1em;"></i>
        </a>
      </div>
    </div>

  </div>

</div>

<script>
// Chargement de la sidebar partagée
fetch('/sidebar.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('sidebar-container').innerHTML = html;
  })
  .catch(err => console.error('Erreur chargement sidebar :', err));

function w3_open() {
  document.getElementById("mySidebar").style.display = "block";
  document.getElementById("sidebarOverlay").style.display = "block";
}

function w3_close() {
  document.getElementById("mySidebar").style.display = "none";
  document.getElementById("sidebarOverlay").style.display = "none";
}

function toggleDropdown(id, btn) {
  var el = document.getElementById(id);
  var isOpen = el.style.display === "block";
  document.querySelectorAll('.dropdown-container').forEach(function(d) {
    d.style.display = "none";
  });
  document.querySelectorAll('.dropdown-btn').forEach(function(b) {
    b.classList.remove('open');
  });
  if (!isOpen) {
    el.style.display = "block";
    btn.classList.add('open');
  }
}
</script>
