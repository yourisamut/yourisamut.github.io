<!DOCTYPE html>
<html>
<head>
<title>Youri Samut - Mathématiques</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="/deco/favicon.png">
<link rel="stylesheet" href="css/w3.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css">
<link rel="stylesheet" href="font-awesome/css/font-awesome.min.css">
<style>
body, h1,h2,h3,h4,h5,h6 {
  font-family: "Computer Modern Bright", sans-serif;
}

body {
  background-color: #f4f4f4;
}

.w3-sidebar {
  width: 200px;
  background: #ffffff;
  border-right: none;
  box-shadow: 3px 0 8px rgba(0,0,0,0.15);
  z-index: 4;
}

#decorative-band {
  position: fixed;
  top: 0;
  left: 200px;
  width: 60px;
  height: 100%;
  z-index: 2;
  overflow: hidden;
  box-shadow: 3px 0 8px rgba(0,0,0,0.15);
}

#decorative-band img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}

#main {
  margin-left: 260px;
  background-color: #f4f4f4;
  min-height: 100vh;
}

@media only screen and (max-width: 992px) {
  #main { margin-left: 0; }
  #decorative-band { display: none; }
  #mySidebar { padding-top: 70px; }
}

@media (max-width: 992px) {
  html, body {
    overflow-x: hidden !important;
    max-width: 100vw !important;
  }

  #cours {
    margin-top: 70px !important;
  }

  .content-section {
    margin: 0 !important;
    padding: 16px 8px !important;
  }

  .cv-body {
    width: 100% !important;
    overflow: hidden !important;
  }

  .cv-body iframe {
    display: block !important;
    width: 100% !important;
    max-width: 100% !important;
    height: calc(100vw * 1.414) !important;
  }
}

.w3-sidebar a.w3-bar-item {
  color: #333;
  font-size: 14px;
  padding: 12px 16px;
  display: block;
  text-decoration: none;
  border-left: 3px solid transparent;
  transition: all 0.2s;
}

.w3-sidebar a.w3-bar-item:hover {
  background-color: #f0f0f0;
  color: #000;
  border-left: 3px solid #555;
}

.sidebar-title {
  padding: 32px 16px 24px;
  text-align: center;
  border-bottom: 1px solid #eee;
  color: #111;
}

.dropdown-btn {
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  background: none;
  border: none;
  font-family: "Montserrat", sans-serif;
  font-size: 14px;
  font-weight: bold;
  color: #333;
  padding: 12px 16px;
  border-left: 3px solid transparent;
  transition: all 0.2s;
  text-align: left;
  box-sizing: border-box;
}

.dropdown-btn:hover {
  background-color: #f0f0f0;
  color: #000;
  border-left: 3px solid #555;
}

.dropdown-btn .fa {
  font-size: 11px;
  transition: transform 0.2s;
}

.dropdown-btn.open .fa {
  transform: rotate(180deg);
}

.dropdown-container {
  display: none;
  background-color: #fafafa;
  border-left: none;
}

.dropdown-container a {
  padding: 10px 16px 10px 28px !important;
  font-size: 13px !important;
  font-weight: normal !important;
  color: #555 !important;
  border-left: 3px solid transparent !important;
}

.dropdown-container a:hover {
  color: #111 !important;
  background-color: #efefef !important;
  border-left: 3px solid #999 !important;
}

.w3-sidebar .nav-link { font-weight: bold; }

header { background-color: #ffffff; border-bottom: 1px solid #ddd; }

.content-section {
  margin: 24px;
  padding: 32px;
}

hr.section-rule {
  border: none;
  border-top: 1px solid #ddd;
  width: 200px;
  margin: 16px auto 24px 0;
}

h2 { color: #111; }
p { color: #444; line-height: 1.7; }

.cv-body {
  max-width: 555px;
  margin: 0 auto;
}

#myNavbar { background: #ffffff !important; border-bottom: 1px solid #ddd; }
#myNavbar a { color: #333 !important; }
#myNavbar a:hover { background-color: #f0f0f0 !important; }
</style>
</head>
<body>

<!-- Sidebar chargée dynamiquement -->
<div id="sidebar-container"></div>

<!-- Contenu principal -->
<div class="w3-padding-large" id="main">

  <div class="content-section" id="cours">
    <h2>Curriculum vitae</h2>
    <hr class="section-rule">

    <div class="cv-body">
      <iframe
        src="assets/pdfjs/web/viewer.html?file=../../../docs/CV.pdf"
        width="555px"
        height="786px"
        style="border:none; display:block;">
      </iframe>
    </div>
  </div>

</div>

<script>
fetch('/sidebar.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('sidebar-container').innerHTML = html;
  })
  .catch(err => console.error('Erreur chargement sidebar :', err));

function w3_open() {
  document.getElementById("mySidebar").style.display = "block";
  document.getElementById("sidebarOverlay").style.display = "block";
}

function w3_close() {
  document.getElementById("mySidebar").style.display = "none";
  document.getElementById("sidebarOverlay").style.display = "none";
}

function toggleDropdown(id, btn) {
  var el = document.getElementById(id);
  var isOpen = el.style.display === "block";
  document.querySelectorAll('.dropdown-container').forEach(function(d) {
    d.style.display = "none";
  });
  document.querySelectorAll('.dropdown-btn').forEach(function(b) {
    b.classList.remove('open');
  });
  if (!isOpen) {
    el.style.display = "block";
    btn.classList.add('open');
  }
}
</script>

</body>
</html>
